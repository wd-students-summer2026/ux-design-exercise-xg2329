<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Experience Design - Xinyue Gao</title>
    <link rel="stylesheet" href="css/main.css" />
</head>

<body class="ux-page">
    <header class="ux-header">
        <h1>User Experience Design</h1>
    </header>

    <main class="ux-layout">
        <section class="prototype">
            <h2>Clickable Prototype</h2>
            <div>
                <a class="prototype-link"
                    href="https://www.figma.com/proto/NQcFdJD6zkcXoi0CymBvo6/UX-Design?node-id=52-2130&t=IAeiHCTeR1JuE4ly-0&scaling=min-zoom&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=52%3A2130"
                    target="_blank" rel="noopener noreferrer">Open my Figma prototype</a>
            </div>
        </section>

        <!-- Wireframe images -->
        <section class="wireframes">
            <h2>Wireframes</h2>
            <div class="wireframe-grid">
                <figure class="wireframe-card">
                    <img src="images/1-Home.png" alt="home screen" />
                    <figcaption>Home screen</figcaption>
                </figure>

                <figure class="wireframe-card">
                    <img src="images/2-Recipe Detail.png" alt="recipe detail screen" />
                    <figcaption>Recipe detail screen</figcaption>
                </figure>

                <figure class="wireframe-card">
                    <img src="images/3-Meal Log.png" alt="meal log screen" />
                    <figcaption>Meal log screen</figcaption>
                </figure>

                <figure class="wireframe-card">
                    <img src="images/4-Favorites.png" alt="favorites screen" />
                    <figcaption>Favorites screen</figcaption>
                </figure>

                <figure class="wireframe-card">
                    <img src="images/5-Profile.png" alt="profile screen" />
                    <figcaption>Profile screen</figcaption>
                </figure>
            </div>
        </section>

        <!-- Site map image -->
        <section class="site_map">
            <h2>Site Map</h2>
            <figure class="site-map-card">
                <img src="images/sitemap.png" alt="Site map for the app" />
                <figcaption>Site map of the app</figcaption>
            </figure>
        </section>
    </main>

    <div class="back-home"><a href="index.html">Back to Home</a></div>
</body>

</html>
